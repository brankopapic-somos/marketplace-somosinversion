            <button type="button" class="btn btn-ghost btn-sm" id="img-mode-url">🔗 Usar URL</button>
            <button type="button" class="btn btn-ghost btn-sm" id="img-mode-upload">📤 Subir archivo</button>
          </div>
          <div id="img-url-section">
            <input name="imagen_portada" id="img-url-input" value="${p.imagen_portada || ''}" placeholder="https://...">
          </div>
          <div id="img-upload-section" style="display:none;">
            <input type="file" id="img-file-input" accept="image/jpeg,image/png,image/webp,image/gif,.jpg,.jpeg,.png,.webp,.gif" style="width:100%;padding:9px;border:1px dashed #cbd5e1;border-radius:6px;background:#f9fafb;">

          </div>

            <div style="font-size:11px;color:#475569;font-weight:600;margin-bottom:4px;">Vista previa:</div>
            <img id="img-preview-el" src="${p.imagen_portada || ''}" style="max-width:300px;max-height:180px;border-radius:8px;border:1px solid #e2e8f0;display:block;object-fit:cover;" onerror="this.style.display='none';">
            <button type="button" class="btn btn-ghost btn-sm" id="img-clear" style="margin-top:6px;color:#dc2626;">× Quitar imagen</button>
          </div>
        </div>
        <div class="field full"><label>Tipologías disponibles (separadas por coma)</label><input name="tipologias_disponibles" value="${(p.tipologias_disponibles || []).join(',')}" placeholder="1d1b,2d2b,3d2b"></div>
        <div class="field full"><label>Descripción</label><textarea name="descripcion">${p.descripcion || ''}</textarea></div>
        <div class="field"><label><input type="checkbox" name="destacado" ${p.destacado ? 'checked' : ''}> Destacado</label></div>
      </div>

        <button type="button" class="btn btn-ghost" id="cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary">${isEdit ? 'Guardar cambios' : 'Crear proyecto'}</button>
      </div>
    </form>
  `;
  const modal = showModal(html);
  modal.querySelector('#cancel').addEventListener('click', () => modal.remove());

  // ===== IMAGEN PORTADA: toggle URL / upload + preview =====
  const imgUrlSection = modal.querySelector('#img-url-section');
  const imgUploadSection = modal.querySelector('#img-upload-section');
  const imgUrlInput = modal.querySelector('#img-url-input');
  const imgFileInput = modal.querySelector('#img-file-input');
  const imgPreview = modal.querySelector('#img-preview');
  const imgPreviewEl = modal.querySelector('#img-preview-el');
  const imgClearBtn = modal.querySelector('#img-clear');
  const imgModeUrlBtn = modal.querySelector('#img-mode-url');
  const imgModeUploadBtn = modal.querySelector('#img-mode-upload');

  const setImageMode = (mode) => {
    if (mode === 'upload') {
      imgUrlSection.style.display = 'none';
      imgUploadSection.style.display = 'block';
      imgModeUploadBtn.classList.remove('btn-ghost'); imgModeUploadBtn.classList.add('btn-primary');
      imgModeUrlBtn.classList.remove('btn-primary'); imgModeUrlBtn.classList.add('btn-ghost');
    } else {
      imgUrlSection.style.display = 'block';
      imgUploadSection.style.display = 'none';
      imgModeUrlBtn.classList.remove('btn-ghost'); imgModeUrlBtn.classList.add('btn-primary');
      imgModeUploadBtn.classList.remove('btn-primary'); imgModeUploadBtn.classList.add('btn-ghost');
    }
  };
  // Default: URL mode (a menos que el valor actual sea dataURL)
  setImageMode(p.imagen_portada && p.imagen_portada.startsWith('data:') ? 'upload' : 'url');

  imgModeUrlBtn.addEventListener('click', () => setImageMode('url'));
  imgModeUploadBtn.addEventListener('click', () => setImageMode('upload'));

  imgUrlInput.addEventListener('input', () => {
    const url = imgUrlInput.value.trim();
    if (url) {
      imgPreview.style.display = 'block';
      imgPreviewEl.style.display = 'block';
      imgPreviewEl.src = url;
    } else {
      imgPreview.style.display = 'none';
    }
  });

  imgFileInput.addEventListener('change', async () => {
    const file = imgFileInput.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      toast(`Imagen muy grande (${(file.size/1024/1024).toFixed(1)} MB). Máximo 2 MB.`, 'error');
      imgFileInput.value = '';
      return;
    }
    if (!file.type.startsWith('image/')) {
      toast('Archivo no es una imagen válida', 'error');
      imgFileInput.value = '';
      return;
    }
    try {
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
      // Guardar el dataURL en el input hidden de imagen_portada
      imgUrlInput.value = dataUrl;
      // Preview
      imgPreview.style.display = 'block';
      imgPreviewEl.style.display = 'block';
      imgPreviewEl.src = dataUrl;
      toast(`Imagen cargada: ${file.name} (${(file.size/1024).toFixed(0)} KB)`);
    } catch (err) {
      toast('Error leyendo imagen: ' + err.message, 'error');
    }
  });

  imgClearBtn.addEventListener('click', () => {
    imgUrlInput.value = '';
    imgFileInput.value = '';
    imgPreview.style.display = 'none';
    imgPreviewEl.src = '';
  });

  modal.querySelector('#form-proyecto').addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd.entries());
    data.destacado = fd.get('destacado') === 'on';
    data.tipologias_disponibles = (data.tipologias_disponibles || '').split(',').map(s => s.trim()).filter(Boolean);
    // imagen_portada viene del input hidden (URL o dataURL)
    try {
      if (isEdit) window.Marketplace.updateProyecto(id, data);
      else window.Marketplace.addProyecto(data);
      modal.remove(); toast(isEdit ? 'Proyecto actualizado' : 'Proyecto creado'); render();
    } catch (err) { toast(err.message, 'error'); }
  });
}

function condiciones() {
  const D = window.DATA;
  tabContent.innerHTML = `
    <div class="panel">
      <h2>Condiciones por proyecto</h2>
      <p style="color:#6b7280;margin-bottom:16px;font-size:13px;">Asignar condiciones comerciales a cada proyecto (tabla relacional <code>ProyectoCondicion</code>). Se puede agregar un valor opcional (ej. "10%", "12 cuotas").</p>
      ${D.proyectos.map(p => {
        const links = D.proyectoCondiciones.filter(pc => pc.proyecto_id === p.id);
        return `
          <div class="panel-section" style="border-bottom:1px solid #e2e6ee;padding-bottom:18px;margin-bottom:18px;">
            <h3 style="font-size:15px;font-weight:600;margin-bottom:10px;">${p.nombre} <span class="badge badge-gray">${p.comuna}</span></h3>
            <div class="checkbox-list">
              ${D.condicionesComerciales.map(c => {
                const link = links.find(l => l.condicion_id === c.id);
                return `
                  <label>
                    <input type="checkbox" data-pc="${p.id}|${c.id}" ${link ? 'checked' : ''}>
                    <span style="min-width:200px;">${c.nombre_publico}</span>
                    <input type="text" data-pcv="${p.id}|${c.id}" placeholder="valor (opcional)" value="${link && link.valor ? link.valor : ''}" ${!link ? 'disabled' : ''}>
                  </label>
                `;
              }).join('')}
            </div>
            <button class="btn btn-primary btn-sm" data-save-pc="${p.id}" style="margin-top:10px;">Guardar condiciones de "${p.nombre}"</button>
          </div>
        `;
      }).join('')}
    </div>
  `;
  document.querySelectorAll('[data-pc]').forEach(cb => {
    cb.addEventListener('change', () => {
      const valInput = cb.parentElement.querySelector('[data-pcv]');
      valInput.disabled = !cb.checked;
      if (!cb.checked) valInput.value = '';
    });
  });
  document.querySelectorAll('[data-save-pc]').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.savePc;
      const ids = []; const valores = {};
      document.querySelectorAll(`[data-pc^="${pid}|"]`).forEach(cb => {
        const cid = cb.dataset.pc.split('|')[1];
        if (cb.checked) {
          ids.push(cid);
          const v = document.querySelector(`[data-pcv="${pid}|${cid}"]`).value.trim();
          if (v) valores[cid] = v;
        }
      });
      window.Marketplace.setCondicionesProyecto(pid, ids, valores);
      toast('Condiciones actualizadas');
    });
  });
}

function clientesAdmin() {
  const clientes = window.Marketplace.listAllClientes();

  const filterBroker = window._adminFilterBroker || '';
  const userById = id => usuarios.find(u => u.id === id);

  let filtered;
  if (filterBroker === '__orphan__') {
    filtered = clientes.filter(c => !userById(c.broker_id));
  } else if (filterBroker) {
    filtered = clientes.filter(c => c.broker_id === filterBroker);
  } else {
    filtered = clientes;
  }

  tabContent.innerHTML = `
    <div class="panel">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        Clientes (vista global, ${filtered.length}${filterBroker ? ' de ' + clientes.length : ''})

      <p style="color:#6b7280;font-size:13px;margin-bottom:16px;">
        Vista admin de TODOS los clientes del marketplace. Acción <strong>Reasignar</strong> permite mover un cliente de un broker a otro,

            return `<option value="${u.id}" ${filterBroker === u.id ? 'selected' : ''}>${u.nombre} · ${u.role} (${cnt})</option>`;

      ${filtered.length === 0 ? '<p style="color:#6b7280;padding:14px;">Sin clientes para mostrar.</p>' : `

        <thead>
          <tr>
            <th>Cliente</th><th>Contacto</th><th>Broker actual</th><th>Cotizaciones</th><th>Reservas</th><th></th>

        </thead>

          ${filtered.map(c => {
            const broker = userById(c.broker_id);

            const rsvs = (window.DATA.reservas || []).filter(x => x.cliente_id === c.id);
            const rsvsActivas = rsvs.filter(r => !['cancelada','escriturada'].includes(r.estado));
            return `
              <tr>
                <td>
                  <strong>${c.nombre}</strong>
                  ${c.rut ? `<br><small style="color:#6b7280;">${c.rut}</small>` : ''}
                </td>
                <td style="font-size:13px;color:#374151;">
                  ${c.email ? c.email + '<br>' : ''}${c.telefono || ''}
                </td>
                <td>
                  ${broker ? `
                    <strong>${broker.nombre}</strong>
                    <br><small style="color:#6b7280;">${broker.email}</small>
                    <br>${broker.role === 'admin' ? '<span class="badge badge-red">admin</span>' : '<span class="badge badge-green">broker</span>'}
                  ` : '<span class="badge badge-red">huérfano</span><br><small style="color:#6b7280;">broker eliminado</small>'}

                <td style="text-align:center;">${cots.length}</td>

                </td>
              </tr>
            `;
          }).join('')}

      </table>

    </div>

  document.getElementById('filter-broker-admin').addEventListener('change', e => {
    window._adminFilterBroker = e.target.value;
    clientesAdmin();
  });

  document.querySelectorAll('[data-reassign]').forEach(b =>
    b.addEventListener('click', () => modalReasignarCliente(b.dataset.reassign)));
  document.querySelectorAll('[data-detail]').forEach(b =>
    b.addEventListener('click', () => modalDetalleCliente(b.dataset.detail)));
  document.querySelectorAll('[data-edit-cli]').forEach(b =>
    b.addEventListener('click', () => modalEditarClienteAdmin(b.dataset.editCli)));
}

function modalReasignarCliente(clienteId) {
  const cli = window.Marketplace.clienteById(clienteId);
  const usuarios = window.DATA.usuarios || [];
  const brokerActual = usuarios.find(u => u.id === cli.broker_id);
  const cotsCount = (window.DATA.cotizaciones || []).filter(c => c.cliente_id === clienteId).length;
  const reservas = (window.DATA.reservas || []).filter(r => r.cliente_id === clienteId);
  const reservasActivas = reservas.filter(r => !['cancelada','escriturada'].includes(r.estado)).length;
  const hasHistory = cotsCount > 0 || reservas.length > 0;

  const html = `
    <h2>Reasignar cliente</h2>

    <div style="background:#f9fafb;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:18px;">
      <div style="font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Cliente</div>
      <div style="font-size:16px;font-weight:600;">${cli.nombre}</div>
      <div style="font-size:13px;color:#374151;margin-top:4px;">
        ${cli.email || ''} ${cli.telefono ? '· ' + cli.telefono : ''}
      </div>
      <div style="margin-top:10px;font-size:13px;">
        <span style="color:#6b7280;">Broker actual:</span>
        ${brokerActual ? `<strong>${brokerActual.nombre}</strong> (${brokerActual.email})` : '<span class="badge badge-red">huérfano</span>'}
      </div>
      ${hasHistory ? `
        <div style="margin-top:10px;font-size:13px;display:flex;gap:18px;flex-wrap:wrap;">
          <div>📋 Cotizaciones: <strong>${cotsCount}</strong></div>
          <div>🔒 Reservas: <strong>${reservas.length}</strong> ${reservasActivas > 0 ? `(${reservasActivas} activa${reservasActivas !== 1 ? 's' : ''})` : ''}</div>
        </div>
      ` : '<div style="margin-top:10px;font-size:13px;color:#6b7280;">Sin historial · reasignación limpia.</div>'}
    </div>

    <form id="form-reassign">
      <div class="field">
        <label>Nuevo broker *</label>
        <select name="newBrokerId" required>
          <option value="">— Seleccionar —</option>
          ${usuarios.filter(u => u.activo && u.id !== cli.broker_id).map(u =>
            `<option value="${u.id}">${u.nombre} · ${u.email} · <em>${u.role}</em></option>`
          ).join('')}
        </select>
      </div>

      ${hasHistory ? `
        <div style="margin-top:14px;padding:12px;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0;font-weight:400;">
            <input type="checkbox" name="reassignHistory" style="margin-top:3px;">
            <div>
              <div style="font-weight:600;color:#92400e;font-size:14px;">Reasignar también historial</div>
              <div style="font-size:12px;color:#78350f;margin-top:4px;line-height:1.4;">
                Si lo marcás, las <strong>${cotsCount}</strong> cotización(es) y <strong>${reservas.length}</strong> reserva(s)
                se atribuirán al nuevo broker (incluye activas y cerradas).
                Si lo dejás sin marcar, el historial conserva la atribución al broker actual (recomendado para auditoría).
              </div>
            </div>
          </label>
        </div>
      ` : ''}

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary">Reasignar</button>
      </div>
    </form>
  `;
  const modal = showModal(html);
  modal.querySelector('#cancel').addEventListener('click', () => modal.remove());
  modal.querySelector('#form-reassign').addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const newBrokerId = fd.get('newBrokerId');
    const reassignHistory = fd.get('reassignHistory') === 'on';
    try {
      const result = window.Marketplace.reassignCliente(clienteId, newBrokerId, { reassignHistory });
      const msg = reassignHistory && hasHistory
        ? `Cliente reasignado. Movidos: ${result.movidas.cotizaciones} cotización(es), ${result.movidas.reservas} reserva(s).`
        : `Cliente reasignado. Historial conservado con broker original.`;
      modal.remove();
      toast(msg);
      clientesAdmin();
    } catch (err) {
      toast(err.message, 'error');
    }
  });
}

function ingesta() {
  const D = window.DATA;
  tabContent.innerHTML = `
    <div class="panel">
      <h2>Ingesta por adaptador</h2>
      <p style="color:#6b7280;margin-bottom:16px;font-size:13px;">El sistema implementa el patrón adaptador + normalizador documentado en <code>docs/02-INGESTA.md</code>. Cada adaptador traduce una fuente externa al modelo común. El normalizador valida y persiste con upsert por <code>(inmobiliaria_id, external_id)</code>.</p>

      <div class="form-grid">
        <div class="field"><label>Adaptador</label>
          <select id="ing-adapter">
            <option value="mock">mock-generator (genera N proyectos sintéticos)</option>
            <option value="json-paste">json-paste (pegás un JSON)</option>
          </select>
        </div>
        <div class="field"><label>Inmobiliaria destino *</label>
          <select id="ing-inmob">
            <option value="">—</option>
            ${D.inmobiliarias.map(i => `<option value="${i.id}">${i.nombre_publico}</option>`).join('')}
          </select>
        </div>
      </div>

      <div id="ing-config-mock" class="form-grid" style="margin-top:16px;">
        <div class="field"><label>Cantidad de proyectos a generar</label><input type="number" id="ing-cantidad" value="2" min="1" max="20"></div>
      </div>

      <div id="ing-config-json" class="form-grid" style="margin-top:16px;display:none;">
        <div class="field full"><label>JSON crudo (array de proyectos con <code>unidades_crudas</code>)</label>
          <textarea id="ing-json" style="min-height:160px;font-family:ui-monospace,monospace;font-size:12px;" placeholder='[{"external_id":"DEMO-001","nombre":"Demo","comuna":"Las Condes","etapa":"en_verde","anio_entrega":2027,"precio_uf_min":3500,"precio_uf_max":5500,"tipologias_disponibles":["1d1b","2d2b"],"unidades_crudas":[{"external_id":"DEMO-001-U1","numero":"101","tipologia":"1d1b","superficie_total":45,"precio_uf":3500}]}]'></textarea>
        </div>
      </div>

      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="btn-run-sync">▶ Correr ingesta</button>
      </div>

      <div id="ing-result" style="margin-top:20px;"></div>
    </div>
  `;

  const adapterSel = document.getElementById('ing-adapter');
  adapterSel.addEventListener('change', () => {
    document.getElementById('ing-config-mock').style.display = adapterSel.value === 'mock' ? 'grid' : 'none';
    document.getElementById('ing-config-json').style.display = adapterSel.value === 'json-paste' ? 'grid' : 'none';
  });

  document.getElementById('btn-run-sync').addEventListener('click', () => {
    const inmob = document.getElementById('ing-inmob').value;
    if (!inmob) { toast('Seleccioná una inmobiliaria', 'error'); return; }
    const adapter = adapterSel.value;
    const config = { inmobiliaria_id: inmob, modo: 'manual' };
    if (adapter === 'mock') config.cantidad = Number(document.getElementById('ing-cantidad').value || 1);
    if (adapter === 'json-paste') config.json = document.getElementById('ing-json').value;
    try {
      const result = window.Marketplace.runIngesta(adapter, config);
      const colorClass = result.status === 'success' ? 'alert-success' : (result.status === 'partial' ? 'alert-warning' : 'alert-danger');
      document.getElementById('ing-result').innerHTML = `
        <div class="alert ${colorClass}">
          Ingesta <strong>${result.status}</strong> en ${result.duracion_ms}ms ·
          recibidos: ${result.proyectos_recibidos} · creados: ${result.proyectos_creados} · actualizados: ${result.proyectos_actualizados} · inválidos: ${result.proyectos_invalidados}
        </div>
        <pre class="json-output">${JSON.stringify(result, null, 2)}</pre>
      `;
      toast(`Ingesta ${result.status}: +${result.proyectos_creados} creados, ~${result.proyectos_actualizados} actualizados`,
            result.status === 'failed' ? 'error' : 'success');
    } catch (err) {
      document.getElementById('ing-result').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      toast(err.message, 'error');
    }
  });
}

// =============================================================================
// AUDITORÍA — historial de ingestas
// =============================================================================
function auditoria() {
  const log = window.Marketplace.getAuditLog();
  tabContent.innerHTML = `
    <div class="panel">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        Auditoría de ingestas (${log.length})
        ${log.length > 0 ? '<button class="btn btn-ghost btn-sm" id="clear-audit">Limpiar historial</button>' : ''}
      </h2>
      ${log.length === 0 ? '<p style="color:#6b7280">Sin registros. Corré una ingesta para ver el historial.</p>' : `
        <table>
          <thead>
            <tr><th>Timestamp</th><th>Adaptador</th><th>Modo</th><th>Status</th><th>Recibidos</th><th>Creados</th><th>Actualizados</th><th>Inválidos</th><th>Duración</th></tr>
          </thead>
          <tbody>
            ${log.map(e => `
              <tr>
                <td>${fmtDate(e.timestamp)}</td>
                <td><code>${e.adapter}</code></td>
                <td>${e.modo}</td>
                <td>${stateBadge(e.status, 'audit')}</td>
                <td>${e.proyectos_recibidos}</td>
                <td>${e.proyectos_creados}</td>
                <td>${e.proyectos_actualizados}</td>
                <td>${e.proyectos_invalidados}</td>
                <td>${e.duracion_ms}ms</td>
              </tr>
              ${e.errores && e.errores.length > 0 ? `
                <tr><td colspan="9" style="background:#fef2f2;font-size:12px;">
                  <strong>Errores:</strong> ${e.errores.map(err => `${err.external_id || err.tipo || '?'}: ${err.msg}`).join(' · ')}
                </td></tr>
              ` : ''}
            `).join('')}
          </tbody>
        </table>
      `}
    </div>
  `;
  if (log.length > 0) {
    document.getElementById('clear-audit').addEventListener('click', () => {
      if (confirm('¿Limpiar historial de auditoría?')) {
        window.Marketplace.clearAuditLog();
        toast('Historial limpiado'); auditoria();
      }
    });
  }
}

// =============================================================================
// DATOS — export / import / reset
// =============================================================================
function datos() {
  tabContent.innerHTML = `
    <div class="panel">
      <h2>Datos del marketplace</h2>
      <p style="color:#6b7280;margin-bottom:16px;font-size:13px;">Exportá el estado actual (incluye cambios en localStorage) o reseteá a los seeds originales.</p>

      <div class="panel-section">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;">Exportar JSON</h3>
        <button class="btn btn-primary" id="btn-export">Exportar datos actuales</button>
        <button class="btn btn-ghost" id="btn-show-export" style="margin-left:8px;">Ver en pantalla</button>
      </div>

      <div class="panel-section">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;">Importar JSON</h3>
        <textarea id="import-json" style="min-height:120px;width:100%;font-family:ui-monospace,monospace;font-size:12px;padding:10px;border:1px solid #d1d5db;border-radius:6px;" placeholder='Pegá aquí un JSON con la estructura {"inmobiliarias":[],"proyectos":[],"unidades":[],"condicionesComerciales":[],"proyectoCondiciones":[],"ufReferencia":{}}'></textarea>
        <button class="btn btn-primary" id="btn-import" style="margin-top:8px;">Importar (reemplaza datos)</button>
      </div>

      <div class="panel-section">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;color:#dc2626;">Zona peligrosa</h3>
        <button class="btn btn-danger" id="btn-reset">Resetear todo a seeds originales</button>
      </div>

      <div id="data-area"></div>
    </div>
  `;
  document.getElementById('btn-export').addEventListener('click', () => {
    const blob = new Blob([window.Marketplace.exportData()], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `marketplace-data-${Date.now()}.json`;
    a.click();
    toast('Descargando JSON');
  });
  document.getElementById('btn-show-export').addEventListener('click', () => {
    document.getElementById('data-area').innerHTML = `<pre class="json-output" style="margin-top:14px;max-height:400px;overflow:auto;">${window.Marketplace.exportData()}</pre>`;
  });
  document.getElementById('btn-import').addEventListener('click', () => {
    try {
      const json = document.getElementById('import-json').value;
      if (!json.trim()) return toast('Pegá un JSON', 'error');
      window.Marketplace.importData(json);
      toast('Datos importados — recargá para ver');
      setTimeout(() => location.reload(), 1500);
    } catch (e) { toast(e.message, 'error'); }
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (confirm('¿Borrar TODO localStorage y volver a seeds originales? Esta acción no se puede deshacer.')) {
      window.Marketplace.reset();
    }
  });
}

// =============================================================================
// HELPERS UI
// =============================================================================
function stateBadge(s, kind) {
  if (kind === 'negocio') {
    const map = { activo: 'badge-green', agotado: 'badge-red', pausado: 'badge-amber' };
    return `<span class="badge ${map[s] || 'badge-gray'}">${s}</span>`;
  }
  if (kind === 'ingesta') {
    const map = { ok: 'badge-green', timeout: 'badge-amber', error: 'badge-red' };
    return `<span class="badge ${map[s] || 'badge-gray'}">${s}</span>`;
  }
  if (kind === 'audit') {
    const map = { success: 'badge-green', partial: 'badge-amber', failed: 'badge-red' };
    return `<span class="badge ${map[s] || 'badge-gray'}">${s}</span>`;
  }
  return s;
}

function unitStateBadge(estado) {
  const map = { disponible: 'badge-green', reservada: 'badge-amber', vendida: 'badge-gray', bloqueada: 'badge-red' };
  return `<span class="badge ${map[estado] || 'badge-gray'}">${estado}</span>`;
}

// Storage events — si otra pestaña (catalogo de un broker) modifica datos, refrescamos
window.addEventListener('storage', e => {
  if (e.key && e.key.startsWith('marketplace.')) location.reload();
});

// Init
render();
</script>
